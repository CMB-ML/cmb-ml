defaults:
  - _self_
  - local_system              : ${oc.env:CMB_ML_LOCAL_SYSTEM}
  - file_system               : common_fs
  - pipeline                  : assembly_pyilc
  - scenario                  : scenario_t
  - splits                    : "1-1" #1-10
  #- model/pyilc               : hilc
  - model/pyilc               : cnilc_512_t
  - model/analysis            : basic_analysis
  - override hydra/job_logging: custom_log

# dataset_name   : ${scenario.map_fields}_${scenario.nside}_${splits.name}545
dataset_name   : ${scenario.map_fields}_${scenario.nside}_1-1
# dataset_name   : IQU_${scenario.nside}_${splits.name}
# dataset_name   : I_128_1450
#working_dir    : "PyILC_HILC_Test_bt${model.pyilc.ILC_bias_tol}_bs${model.pyilc.distinct.BinSize}/"
#fig_model_name : "HILC bias_tol=${model.pyilc.ILC_bias_tol} bin_size=${model.pyilc.distinct.BinSize}"

#working_dir    : "PyILC_CNILC_Test_bt${model.pyilc.ILC_bias_tol}_bs${model.pyilc.distinct.BinSize}_2/"
working_dir    : "PyILC_CNILC_Test_lp${model.pyilc.distinct.ellpeaks}/"
fig_model_name : "CNILC bias_tol=${model.pyilc.ILC_bias_tol} bin_size=${model.pyilc.distinct.BinSize}"



hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Note that the parameters which are altered are used above in the working_dir and fig_model_name for clarity!
      model.pyilc.ILC_bias_tol: 0.001 #0.5, 0.2, 0.1, 0.05, 0.02, 0.01, 0.005, 0.002, 0.001, 0.0005, 0.0002, 0.0001
      model.pyilc.distinct.BinSize: 200
      model.pyilc.distinct.ellpeaks: '[200,715,1025]' #'[100,715,1025],[200,715,800]' #'[150,715,1025],[200,715,1025],[150,715,900],[200,715,900]' #'[150,900],[150,1025],[150,1150],[200,900],[200,1025],[200,1150],[250,900],[250,1025],[250,1150]'
      #model.pyilc.distinct.ellpeaks: '[10,100,191], [30,100,191] , [60,100,191], [90,100,191]'
  run:
    dir        : Logs/${now:%Y-%m-%d-%H-%M-%S}
  sweep:
    dir        : Logs/${now:%Y-%m-%d-%H-%M-%S}  # Should be the same as run.dir
    subdir     : ${hydra.job.num}               # Subsequent jobs will include duplicate logs for all previous jobs. This is a minor bug, not worth fixing.
  verbose      : true

# Settings below this point are used for interpolation.
# These are not to be used directly in python.
# They are picked up from here and MAY be used elsewhere in the yamls. Be careful, check assumptions!
# In the scenario yaml
nside          : 512
#nside          : 64
# detectors      : [44, 70, 100, 143, 217, 353, 545, 857]
detectors      : [44, 70, 100, 143, 217, 353, 545, 857]  # For HILC, 857 causes crashes when used with other detectors. Removing 30 and 857 was not enough to guarantee successful runs.
map_fields     : "IQU" #I

# In the pipeline yamls
# No epochs exist for PyILC method; use a placeholder:
use_epochs           : &epochs [""]
use_epochs_imgs      : *epochs
use_epochs_map_stats : *epochs
use_epochs_ps_stats  : *epochs
# Limit the number of simulations for which to generate figures
n_show_cap           : 10   # int: first n_sims; null: all sims; list: particular sims by index

# In the splits yaml; null to run on all
n_test_cap           : 10

# In the model yaml, for HILC:
#ELLMAX: 190   # For 64
#ELLMAX: 382
ELLMAX: 1024  # For 512

# In the model yaml, for CNILC:
#ELLMAX: 1534  # For 512
